name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # Тесты гоняются на серверах GitHub — там есть postgres как сервис
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run migrations
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_db
        run: alembic upgrade head

      - name: Run tests
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_db
          SECRET_KEY: ci-test-secret-not-used-in-production
        run: pytest tests/ -q --no-header -W ignore::DeprecationWarning

  deploy:
    needs: test
    runs-on: self-hosted
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Write .env.docker
        shell: powershell
        run: |
          Set-Content  -Path .env.docker -Value "DATABASE_URL=${{ secrets.DATABASE_URL }}"
          Add-Content  -Path .env.docker -Value "SECRET_KEY=${{ secrets.SECRET_KEY }}"
          Add-Content  -Path .env.docker -Value "CORS_ORIGINS=${{ secrets.CORS_ORIGINS }}"

      - name: Deploy
        shell: powershell
        run: docker compose up -d --build --no-deps app
